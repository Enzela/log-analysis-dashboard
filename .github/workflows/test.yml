name: Run Pytest
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: cannizzaro
          POSTGRES_DB: log_analysis_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn sqlalchemy psycopg2-binary python-multipart scikit-learn numpy pandas pytest httpx2 python-jose passlib bcrypt
      - name: Run pytest
        run: |
          TEST_FILE=$(find . -name "test_log_upload.py" -type f | head -1)
          BACKEND_DIR=$(dirname $(dirname $TEST_FILE))
          cd $BACKEND_DIR
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/test_log_upload.py -v
        env:
          DATABASE_URL: postgresql://postgres:cannizzaro@localhost:5432/log_analysis_db
